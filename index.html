<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Links oficiais de Mateus | Dev e Codex."
  />
  <meta name="theme-color" content="#050806" />

  <title>Mateus | Dev — Links</title>

  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css?v=aquadexa-products" />
</head>

<body>
  <div class="ambient ambient-one" aria-hidden="true"></div>
  <div class="ambient ambient-two" aria-hidden="true"></div>
  <div class="grid-noise" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="profile-card" aria-labelledby="profile-title">
      <div class="profile-glow" aria-hidden="true"></div>

      <header class="profile-header">
        <div class="avatar-shell">
          <div class="avatar-ring">
            <img
              class="avatar"
              src="./assets/avatar-mateus.jpg"
              alt="Foto de perfil de Mateus"
              width="152"
              height="152"
            />
          </div>
          <span class="online-dot" aria-label="Disponível"></span>
        </div>

        <h1 id="profile-title">Mateus <span>|</span> Dev</h1>
        <a
          class="profile-handle"
          href="https://www.tiktok.com/@codexa.web"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir o perfil codexa.web no TikTok"
        >
          @codexa.web
        </a>

        <div class="profile-bio">
          <p>Sites que geram mais clientes <span aria-hidden="true">🚀</span></p>
          <p>Sites <span>•</span> Sistemas <span>•</span> Landing Pages</p>
          <p>Atendimento para Brasil e exterior <span aria-hidden="true">🇧🇷</span></p>
        </div>
      </header>

      <nav class="links-list" id="links-list" aria-label="Links principais separados por categoria"></nav>

      <footer class="page-footer">
        <a
          class="brand-mark"
          href="https://www.codexa-web.online/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Abrir o site da Codexa"
        >
          <span class="code-symbol" aria-hidden="true">&lt;/&gt;</span>
          <strong>codexa-web.online</strong>
        </a>
        <p>Sites <span>•</span> Sistemas <span>•</span> Estratégia <span>•</span> Resultados</p>
      </footer>
    </section>
  </main>

  <script src="./script.js?v=aquadexa-products"></script>
</body>
</html>
